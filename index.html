<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trendify</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden; /* 🚫 NO SCROLL */
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    nav {
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      border-bottom: 1px solid #222;
    }

    nav h1 {
      letter-spacing: 3px;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 30px;
    }

    nav ul li {
      cursor: pointer;
      color: #aaa;
      transition: 0.3s;
    }

    nav ul li:hover {
      color: white;
    }

    /* MAIN CONTENT */
    .container {
      flex: 1;
      display: flex;
    }

    .section {
      width: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    .active {
      display: flex;
    }

    h2 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    p {
      max-width: 500px;
      color: #aaa;
    }

    /* SHOP GRID */
    .grid {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      width: 180px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <h1>TRENDIFY</h1>
    <ul>
      <li onclick="showSection('home')">Home</li>
      <li onclick="showSection('shop')">Shop</li>
      <li onclick="showSection('about')">About</li>
    </ul>
  </nav>

  <!-- CONTENT -->
  <div class="container">

    <!-- HOME -->
    <div id="home" class="section active">
      <h2>Trendify</h2>
      <p>Minimal streetwear. Maximum impact.</p>
    </div>

    <!-- SHOP -->
    <div id="shop" class="section">
      <h2>Shop</h2>
      <div class="grid">
        <div class="card">Hoodies</div>
        <div class="card">Graphic Tees</div>
        <div class="card">Joggers</div>
      </div>
    </div>

    <!-- ABOUT -->
    <div id="about" class="section">
      <h2>About Us</h2>
      <p>
        Trendify is built on modern street culture, combining minimalism with bold identity.
        Every piece is designed to stand out effortlessly.
      </p>
    </div>

  </div>

  <script>
    function showSection(sectionId) {
      document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
      });

      document.getElementById(sectionId).classList.add('active');
    }
  </script>

</body>
</html>
