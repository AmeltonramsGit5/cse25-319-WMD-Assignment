<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trendify</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
body { height:100vh; overflow:hidden; background:#000; color:#fff; }

/* NAVBAR */
nav { position:absolute; width:100%; top:0; display:flex; justify-content:space-between; padding:25px 50px; z-index:10; }
.logo { font-weight:600; letter-spacing:4px; }
.nav-links { display:flex; gap:30px; }
.nav-links span { cursor:pointer; color:#aaa; transition:0.3s; }
.nav-links span:hover { color:white; }

/* SECTIONS */
.section { position:absolute; width:100%; height:100%; display:none; justify-content:center; align-items:center; flex-direction:column; text-align:center; }
.active { display:flex; }

/* TEXT */
h1 { font-size:4rem; }
p { color:#aaa; margin-top:10px; }

/* BUTTON */
.btn { margin-top:25px; padding:10px 25px; border:1px solid white; background:transparent; color:white; cursor:pointer; }
.btn:hover { background:white; color:black; }

/* GRID */
.grid { display:flex; gap:20px; margin-top:30px; flex-wrap:wrap; }

/* CARDS */
.card { width:180px; height:220px; border-radius:12px; display:flex; align-items:flex-end; justify-content:center; padding-bottom:15px; background:#111; transition:0.3s; cursor:pointer; }
.card:hover { transform:translateY(-10px); }

/* CATEGORY BUTTONS */
.card.category { background:#222; font-weight:600; font-size:1.2rem; }
.card.category:hover { background:#444; }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">TRENDIFY</div>
  <div class="nav-links">
    <span onclick="show('home')">Home</span>
    <span onclick="show('catalog')">Catalog</span>
    <span onclick="show('about')">About</span>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="section active">
  <h1>TRENDIFY</h1>
  <p>Modern Streetwear Redefined</p>
  <button class="btn" onclick="show('catalog')">View Catalog</button>
</div>

<!-- CATALOG -->
<div id="catalog" class="section">
  <h1>Catalog</h1>

  <!-- MEN/WOMEN CATEGORIES -->
  <div class="grid">
    <div class="card category" onclick="toggleCategory('men')">MEN</div>
    <div class="card category" onclick="toggleCategory('women')">WOMEN</div>
  </div>

  <!-- MEN PRODUCTS -->
  <div id="men" class="grid category-products" style="display:none; margin-top:20px;">
    <div class="card">Hoodies</div>
    <div class="card">Tees</div>
    <div class="card">Joggers</div>
  </div>

  <!-- WOMEN PRODUCTS -->
  <div id="women" class="grid category-products" style="display:none; margin-top:20px;">
    <div class="card">Hoodies</div>
    <div class="card">Tees</div>
    <div class="card">Joggers</div>
  </div>
</div>

<!-- ABOUT -->
<div id="about" class="section">
  <h1>About</h1>
  <p>
    Trendify is a minimal streetwear brand focused on identity,
    simplicity, and bold expression.
  </p>
</div>

<script>
// Switch main sections
function show(section) {
  document.querySelectorAll('.section').forEach(s => {
    s.classList.remove('active');
  });
  document.getElementById(section).classList.add('active');
}

// Toggle individual categories independently
function toggleCategory(cat) {
  const element = document.getElementById(cat);
  if (element.style.display === 'flex') {
    element.style.display = 'none'; // hide if visible
  } else {
    element.style.display = 'flex'; // show if hidden
  }
}
</script>

</body>
</html>
