<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trendify</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: #000;
  color: #fff;
}

/* NAV */
nav {
  position: absolute;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  padding: 25px 50px;
}

.logo {
  font-weight: 600;
  letter-spacing: 4px;
}

.nav-links {
  display: flex;
  gap: 30px;
}

.nav-links span {
  cursor: pointer;
  color: #aaa;
}

.nav-links span:hover {
  color: white;
}

/* SECTIONS */
.section {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  opacity: 0;
  transition: 0.5s;
}

.active {
  opacity: 1;
}

/* TEXT */
h1 {
  font-size: 4rem;
}

p {
  color: #aaa;
  margin-top: 10px;
}

/* SHOP */
.grid {
  display: flex;
  gap: 20px;
  margin-top: 30px;
}

/* CARDS */
.card {
  width: 180px;
  height: 220px;
  border-radius: 12px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 15px;
  background: #111;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* 🔥 HOODIE BACKGROUND */
.hoodie {
  background: url('YOUR-IMAGE-LINK-HERE') center/cover no-repeat;
  position: relative;
}

/* DARK OVERLAY FOR READABILITY */
.hoodie::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
  border-radius: 12px;
}

.hoodie span {
  position: relative;
  z-index: 2;
}

/* BUTTON */
.btn {
  margin-top: 25px;
  padding: 10px 25px;
  border: 1px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
}

.btn:hover {
  background: white;
  color: black;
}

</style>
</head>

<body>

<nav>
  <div class="logo">TRENDIFY</div>
  <div class="nav-links">
    <span onclick="show('home')">Home</span>
    <span onclick="show('shop')">Shop</span>
    <span onclick="show('about')">About</span>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="section active">
  <h1>TRENDIFY</h1>
  <p>Modern Streetwear Redefined</p>
  <button class="btn">Shop Now</button>
</div>

<!-- SHOP -->
<div id="shop" class="section">
  <h1>Shop</h1>
  <div class="grid">
    <div class="card hoodie"><span>Hoodies</span></div>
    <div class="card"><span>Tees</span></div>
    <div class="card"><span>Joggers</span></div>
  </div>
</div>

<!-- ABOUT -->
<div id="about" class="section">
  <h1>About</h1>
  <p>
    Trendify is a minimal streetwear brand focused on identity,
    simplicity, and bold expression.
  </p>
</div>

<script>
function show(section) {
  document.querySelectorAll('.section').forEach(s => {
    s.classList.remove('active');
  });
  document.getElementById(section).classList.add('active');
}
</script>

</body>
</html>
