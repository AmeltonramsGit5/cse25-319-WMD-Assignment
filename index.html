<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDIFY // CORE_COLLECTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        /* Specific CSS to mimic the Pinterest aesthetic */
        :root {
            --neon: #39FF14; /* Your specific neon accent [cite: 4] */
        }
        
        .hero-wrap {
            height: 100vh;
            background: url('https://i.pinimg.com/originals/ba/8c/2a/ba8c2a93910609f7a55c27653a948283.jpg'); /* Direct background link */
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        /* The "Liquid" Distortion Overlay */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
            backdrop-filter: contrast(120%) brightness(80%);
        }

        .liquid-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(5rem, 18vw, 15rem);
            line-height: 0.75;
            letter-spacing: -0.08em;
            mix-blend-mode: difference; /* This creates the "inverted" look seen in streetwear design */
        }

        .brutal-border {
            border: 2px solid var(--neon);
            padding: 10px 20px;
            transition: all 0.3s ease;
        }

        .brutal-border:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 20px var(--neon);
        }
    </style>
</head>
<body class="bg-black text-white font-monospace">

    <nav class="navbar navbar-dark fixed-top p-4 z-3">
        <div class="container-fluid border-bottom border-secondary pb-3">
            <a class="navbar-brand fw-black fs-1 tracking-tighter" href="index.html">TRNDFY_</a>
            <div class="d-flex gap-5">
                <a href="#shop" class="nav-link text-neon fw-bold small">[ DROP_01 ]</a>
                <a href="#about" class="nav-link small">[ THE_MISSION ]</a>
            </div>
        </div>
    </nav>

    <section class="hero-wrap d-flex align-items-center justify-content-center">
        <div class="hero-overlay"></div>
        <div class="container-fluid text-center z-2">
            <h1 class="liquid-title mb-0">TREND</h1>
            <h1 class="liquid-title text-neon mb-5">IFY</h1>
            <div class="mt-4">
                <a href="#shop" class="brutal-border text-white text-decoration-none fw-bold tracking-widest">
                    ENTER_THE_VOID
                </a>
            </div>
        </div>
    </section>

    <section id="shop" class="py-5 bg-black">
        <div class="container-fluid px-5">
            <div class="row g-0">
                <div class="col-md-6 border border-secondary p-5">
                    <h3 class="display-6 fw-bold mb-4">01_TOPS</h3>
                    <div class="product-card">
                        <img src="assets/img/hoodie.jpg" class="img-fluid grayscale filter-neon" alt="Streetwear Hoodie">
                    </div>
                </div>
                <div class="col-md-6 border border-secondary p-5">
                    <h3 class="display-6 fw-bold mb-4">02_BOTTOMS</h3>
                    <div class="product-card">
                        <img src="assets/img/cargoes.jpg" class="img-fluid grayscale" alt="Streetwear Cargoes">
                        <p class="mt-3 fs-5">CARGO_SYSTEM_01 // <span class="text-neon">$120</span></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
