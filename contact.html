<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - Trendify</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary px-3">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold text-warning" href="index.html">TRENDIFY</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-3">

        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active text-warning" href="contact.html">Contact</a></li>

      </ul>
    </div>

  </div>
</nav>

<!-- MAIN CONTENT -->
<main class="main-content">

  <div class="container py-5">

    <h2 class="mb-3">Contact Us</h2>
    <p class="text-muted">We’d love to hear from you.</p>

    <form id="contactForm" class="mt-3">

      <input class="form-control mb-2" type="text" placeholder="Name" required>
      <input class="form-control mb-2" type="email" placeholder="Email" required>
      <textarea class="form-control mb-3" placeholder="Message"></textarea>

      <button class="btn btn-warning w-100 fw-bold" type="submit">
        Send Message
      </button>

    </form>

  </div>

</main>
  
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- FORM SCRIPT -->
<script>
document.getElementById("contactForm").addEventListener("submit", e => {
  e.preventDefault();
  alert("Message sent!");
});
</script>

</body>
  
<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <p>© 2026 All Rights Reserved · <span class="brand">TRENDIFY</span></p>
  </div>
</footer>
</html>
