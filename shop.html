<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendify Shop</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4">
<a class="navbar-brand text-warning fw-bold" href="#">TRENDIFY</a>
</nav>

<div class="container py-5">

<h1 class="text-center text-warning mb-4">Mens Collection</h1>

<div class="text-center mb-4">
<button class="btn btn-warning" onclick="showSection('hoodies')">Hoodies</button>
<button class="btn btn-outline-warning" onclick="showSection('cargo')">Cargo</button>
<button class="btn btn-outline-warning" onclick="showSection('tees')">Graphic Tees</button>
</div>

<div id="products-container"></div>

</div>

<footer>
© 2026 TRENDIFY
</footer>

<script>
const products = {

hoodies: `
<div class="shop-row">
<div class="card">
<img src="images/hoodie1.jpg">
<div class="card-body text-center">
<h5>Black Hoodie</h5>
<p>P550</p>
</div>
</div>

<div class="card">
<img src="images/hoodie2.jpg">

<div class="card-body text-center">
<h5>Oversized Hoodie</h5>
<p>P650</p>
</div>
</div>
</div>
`,

cargo: `
<div class="shop-row">
<div class="card">
<img src="images/cargo1.jpg">
<div class="card-body text-center">
<h5>Black Cargo</h5>
<p>P700</p>
</div>
</div>

<div class="card">
<img src="images/cargo2.jpg">

function showSection(section){
document.getElementById("products-container").innerHTML = products[section];
}

// default view
showSection('hoodies');
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
